name: Build Next Blog To Pages
on:
  push:
    branches: [ main ]

jobs:
  build-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build
        working-directory: ./Kirameku
        run: |
          npm install
          npm run build

      - name: Upload static out folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: Kirameku/out

  deploy-job:
    needs: build-job
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment: github-pages
    steps:
      - uses: actions/deploy-pages@v4
