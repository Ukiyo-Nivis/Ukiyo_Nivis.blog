name: Build Next Blog To Pages
on:
  push:
    branches: [ main ]
jobs:
  build-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "Kirameku/package-lock.json"

      - name: Build static site
        working-directory: ./Kirameku
        run: |
          npm ci
          npm run build

      - name: Upload static files
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./Kirameku/out

  deploy-job:
    needs: build-job
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
